# Configuración de Netlify para Flutter Web
# Netlify no tiene Flutter instalado, por eso el comando lo descarga primero.
# Tiempo estimado de build: 4-6 minutos.

[build]
  command = "git clone https://github.com/flutter/flutter.git -b stable --depth 1 && export PATH=\"$PATH:`pwd`/flutter/bin\" && flutter pub get && flutter build web --release"
  publish = "build/web"

[build.environment]
  FLUTTER_WEB_USE_SKIA = "true"
