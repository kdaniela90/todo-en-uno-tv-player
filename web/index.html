<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Todo en Uno TV — Tu entretenimiento en un solo lugar">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TEUTV Player">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#060C1B">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>TEUTV Player</title>

  <!-- HLS.js: necesario para reproducir streams HLS (.m3u8) en Chrome y Firefox -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #060C1B;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #060C1B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading img { width: 160px; }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(93,224,230,.2);
      border-top-color: #5DE0E6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading p {
      color: rgba(255,255,255,.45);
      font-family: -apple-system, sans-serif;
      font-size: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading screen shown while Flutter initializes -->
  <div id="loading">
    <img src="assets/assets/images/logo.png" alt="Todo en Uno TV"
         onerror="this.style.display='none'">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>

  <script>
    // Hide loading screen once Flutter renders
    window.addEventListener('flutter-first-frame', function() {
      const el = document.getElementById('loading');
      if (el) {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
      }
    });

    // ── Reescribir URLs del servidor IPTV para que pasen por el proxy Netlify ──
    // El servidor IPTV bloquea peticiones directas desde el navegador (CORS + mixed-content).
    // Interceptamos fetch() globalmente y redirigimos allinonestream.fans → /xtream-live/
    // Esto cubre tanto el manifest .m3u8 como cada segmento .ts que HLS.js solicite.
    (function() {
      var _origFetch = window.fetch;
      window.fetch = function(input, init) {
        var url = (typeof input === 'string') ? input : (input && input.url) || '';
        if (url && url.match(/https?:\/\/allinonestream\.fans/i)) {
          // Reescribir /live/ → /xtream-live/ para que pase por el redirect de Netlify CDN
          var rewritten = url.replace(/https?:\/\/allinonestream\.fans:\d+\/live\//i, '/xtream-live/');
          console.log('[TEUTV] fetch rewrite:', url, '→', rewritten);
          return _origFetch.call(this, rewritten, init);
        }
        return _origFetch.call(this, input, init);
      };
    })();

    // ── HLS.js player bridge (usado por lib/widgets/hls_player_web.dart) ──
    window._hls = {};

    // Crea el <div> contenedor del player y lo devuelve.
    // Lo llama Flutter (dart:ui_web registerViewFactory) desde hls_player_web.dart.
    window.hlsCreateContainer = function(viewId) {
      var div = document.createElement('div');
      div.id = 'hlsv-' + viewId;
      div.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:#000;overflow:hidden;';
      return div;
    };

    // Último error de HLS.js — legible desde Dart con @JS('_hlsLastError')
    window._hlsLastError = '';

    window.hlsCreate = function(viewId, url, onReady, onError) {
      console.log('[TEUTV] hlsCreate viewId=' + viewId + ' url=' + url);

      var container = document.getElementById('hlsv-' + viewId);
      if (!container) {
        console.warn('[TEUTV] container not found yet, retrying...');
        setTimeout(function(){ window.hlsCreate(viewId, url, onReady, onError); }, 150);
        return;
      }

      // Limpiar instancia anterior si existe
      if (window._hls[viewId]) { window._hls[viewId].destroy(); delete window._hls[viewId]; }

      var video = document.createElement('video');
      video.style.cssText = 'width:100%;height:100%;background:#000;display:block;';
      video.setAttribute('playsinline', '');
      video.setAttribute('autoplay', '');
      container.innerHTML = '';
      container.appendChild(video);

      // Detectar si es HLS (canales en vivo) o video directo (VOD/películas)
      var isHls = url.indexOf('hls-proxy') !== -1 || url.indexOf('.m3u8') !== -1;

      if (isHls && window.Hls && Hls.isSupported()) {
        console.log('[TEUTV] Using HLS.js for:', url);
        var hls = new Hls({ lowLatencyMode: false, debug: false });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          console.log('[TEUTV] Manifest parsed OK — playing');
          video.play().catch(function(e){ console.warn('[TEUTV] play() rejected:', e); });
          if (onReady) onReady();
        });
        hls.on(Hls.Events.ERROR, function(event, data) {
          console.error('[TEUTV] HLS error fatal=' + data.fatal
            + ' type=' + data.type + ' details=' + data.details + ' url=' + (data.url || ''));
          window._hlsLastError = data.type + ':' + data.details + (data.url ? ' | URL: ' + data.url : '');
          if (data.fatal && onError) onError();
        });
        window._hls[viewId] = hls;
      } else if (isHls && video.canPlayType('application/vnd.apple.mpegurl')) {
        console.log('[TEUTV] Using native HLS (Safari) for:', url);
        video.src = url;
        video.addEventListener('loadeddata', function() { if (onReady) onReady(); });
        video.addEventListener('error', function(e) {
          window._hlsLastError = 'nativeHls:error';
          console.error('[TEUTV] Native HLS error', e);
          if (onError) onError();
        });
        video.play().catch(function(){});
      } else {
        // VOD / MP4 — usar native <video> con controles nativos del browser
        // vod-resolve devuelve 302 → /xtream-vod-media/ → CDN → MP4
        console.log('[TEUTV] Using native video (VOD/MP4) for:', url);
        video.setAttribute('controls', '');
        video.setAttribute('controlsList', 'nodownload');
        video.style.cssText = 'width:100%;height:100%;background:#000;display:block;object-fit:contain;';
        video.src = url;
        video.addEventListener('canplay', function() {
          console.log('[TEUTV] Native video canplay');
          video.play().catch(function(e){ console.warn('[TEUTV] play() rejected:', e); });
          if (onReady) onReady();
        });
        video.addEventListener('error', function(e) {
          var code = video.error ? video.error.code : '?';
          window._hlsLastError = 'nativeVideo:MediaError:' + code;
          console.error('[TEUTV] Native video error code=' + code, e);
          if (onError) onError();
        });
      }
    };

    window.hlsDestroy = function(viewId) {
      if (window._hls && window._hls[viewId]) {
        window._hls[viewId].destroy();
        delete window._hls[viewId];
      }
    };

    window.hlsLoad = function(viewId, url) {
      if (window._hls && window._hls[viewId]) {
        window._hls[viewId].stopLoad();
        window._hls[viewId].loadSource(url);
        window._hls[viewId].startLoad();
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
