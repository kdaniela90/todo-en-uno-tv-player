<!DOCTYPE html>
<html lang="es">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Todo en Uno TV — Tu entretenimiento en un solo lugar">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TEUTV Player">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#060C1B">

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Icons -->
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>TEUTV Player</title>

  <!-- HLS.js: necesario para reproducir streams HLS (.m3u8) en Chrome y Firefox -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background-color: #060C1B;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    /* Loading screen */
    #loading {
      position: fixed;
      inset: 0;
      background: #060C1B;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #loading img { width: 160px; }
    #loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(93,224,230,.2);
      border-top-color: #5DE0E6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    #loading p {
      color: rgba(255,255,255,.45);
      font-family: -apple-system, sans-serif;
      font-size: 13px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading screen shown while Flutter initializes -->
  <div id="loading">
    <img src="assets/assets/images/logo.png" alt="Todo en Uno TV"
         onerror="this.style.display='none'">
    <div class="spinner"></div>
    <p>Cargando...</p>
  </div>

  <script>
    // Hide loading screen once Flutter renders
    window.addEventListener('flutter-first-frame', function() {
      const el = document.getElementById('loading');
      if (el) {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 400);
      }
    });

    // ── HLS.js player bridge (usado por lib/widgets/hls_player_web.dart) ──
    window._hls = {};

    // Crea el <div> contenedor del player y lo devuelve.
    // Lo llama Flutter (dart:ui_web registerViewFactory) desde hls_player_web.dart.
    window.hlsCreateContainer = function(viewId) {
      var div = document.createElement('div');
      div.id = 'hlsv-' + viewId;
      div.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;background:#000;overflow:hidden;';
      return div;
    };

    window.hlsCreate = function(viewId, url, onReady, onError) {
      var container = document.getElementById('hlsv-' + viewId);
      if (!container) { setTimeout(function(){ window.hlsCreate(viewId, url, onReady, onError); }, 100); return; }

      // Limpiar instancia anterior si existe
      if (window._hls[viewId]) { window._hls[viewId].destroy(); delete window._hls[viewId]; }

      var video = document.createElement('video');
      video.style.cssText = 'width:100%;height:100%;background:#000;display:block;';
      video.setAttribute('playsinline', '');
      video.setAttribute('autoplay', '');
      container.innerHTML = '';
      container.appendChild(video);

      if (window.Hls && Hls.isSupported()) {
        var hls = new Hls({ lowLatencyMode: false, debug: false });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() {
          video.play().catch(function(){});
          if (onReady) onReady();
        });
        hls.on(Hls.Events.ERROR, function(event, data) {
          if (data.fatal && onError) onError();
        });
        window._hls[viewId] = hls;
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari: HLS nativo
        video.src = url;
        video.addEventListener('loadeddata', function() { if (onReady) onReady(); });
        video.addEventListener('error', function() { if (onError) onError(); });
        video.play().catch(function(){});
      } else {
        if (onError) onError();
      }
    };

    window.hlsDestroy = function(viewId) {
      if (window._hls && window._hls[viewId]) {
        window._hls[viewId].destroy();
        delete window._hls[viewId];
      }
    };

    window.hlsLoad = function(viewId, url) {
      if (window._hls && window._hls[viewId]) {
        window._hls[viewId].stopLoad();
        window._hls[viewId].loadSource(url);
        window._hls[viewId].startLoad();
      }
    };
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
